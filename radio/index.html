<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RescueLink Dispatcher</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0b1220; --card: #121a2b; --text: #eef4ff; --red: #ff4d4d; 
            --green: #00c853; --orange: #FF6B00; --info: #0099CC; --border: #24314d;
            --accent: #400;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        label { display: block; font-size: 11px; font-weight: bold; margin: 12px 0 8px 0; color: #8899ac; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

        .btn, .avpu-btn { border: 1px solid var(--border); padding: 12px 5px; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; background: #1a243a; font-size: 11px; transition: 0.2s; text-transform: uppercase; width: 100%; box-sizing: border-box; }
        .btn.active, .avpu-btn.active { background: var(--green) !important; border-color: var(--green); color: white; }
        
        .btn-status { height: 45px; }
        .btn-hq { border-left: 4px solid var(--info); }
        .btn-scene { border-left: 4px solid var(--orange); }
        
        .input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; box-sizing: border-box; font-family: inherit; }
        .dispatch-btn { background: var(--red); width: 100%; padding: 18px; margin-top: 15px; border-radius: 8px; border: 0; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        .log-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .log-table td { padding: 8px; border-bottom: 1px solid #1a2333; }
        .note-btn { background: #24314d; color: var(--info); border: 1px solid var(--info); }
    </style>
</head>
<body>

    <h2 style="color:var(--red); margin:0 0 15px 0;">🚨 RESCUELINK RADIO</h2>

    <div class="card">
        <label>SENDING UNIT</label>
        <div class="grid-3">
            <button class="avpu-btn unit-btn" onclick="setUnit('RESCUE 1', this)">RESCUE 1</button>
            <button class="avpu-btn unit-btn" onclick="setUnit('RESCUE 2', this)">RESCUE 2</button>
            <button class="avpu-btn unit-btn" onclick="setUnit('RESCUE 3', this)">RESCUE 3</button>
        </div>

        <label>RESCUE TYPE</label>
        <div class="grid-4">
            <button class="avpu-btn type-btn" style="background:var(--accent)" onclick="setType('RCR', this)">RCR</button>
            <button class="avpu-btn type-btn" style="background:var(--accent)" onclick="setType('GLR', this)">GLR</button>
            <button class="avpu-btn type-btn" style="background:var(--accent)" onclick="setType('IDR', this)">IDR</button>
            <button class="avpu-btn type-btn" style="background:var(--accent)" onclick="setType('VERT', this)">VERT</button>
            <button class="avpu-btn type-btn" style="background:var(--accent)" onclick="setType('FR', this)">FR</button>
            <button class="avpu-btn type-btn" style="background:var(--accent)" onclick="setType('USAR', this)">USAR</button>
            <button class="avpu-btn type-btn" style="background:var(--accent)" onclick="setType('AMBO', this)">AMBO</button>
            <button class="avpu-btn type-btn" style="background:#444" onclick="setType('ANIMAL', this)">ANIMAL</button>
        </div>

        <label>ENTRAPMENT STATUS</label>
        <div class="grid-2">
            <button class="avpu-btn trap-btn" onclick="setTrap('COMPRESSION', this)">TRAPPED: COMPRESSION</button>
            <button class="avpu-btn trap-btn" onclick="setTrap('CONFINEMENT', this)">TRAPPED: CONFINEMENT</button>
        </div>

        <label>CASUALTIES</label>
        <div class="grid-5">
            <button class="avpu-btn cas-btn" onclick="setCas('0', this)">0</button>
            <button class="avpu-btn cas-btn" onclick="setCas('1', this)">1</button>
            <button class="avpu-btn cas-btn" onclick="setCas('2', this)">2</button>
            <button class="avpu-btn cas-btn" onclick="setCas('3', this)">3</button>
            <button class="avpu-btn cas-btn" onclick="setCas('4+', this)">4+</button>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>SITREP / NOTES</label>
            <button class="btn note-btn" style="width:auto; padding:2px 10px; margin-bottom:5px; font-size:10px;" onclick="sendOnlyNote()">SEND ONLY NOTE</button>
        </div>
        <input id="other-info" placeholder="Specific hazards, access info..." class="input">

        <label style="margin-top: 20px; color: var(--text);">UNIT STATUS UPDATES</label>
        <div class="grid-2">
            <button class="btn btn-status btn-hq" onclick="broadcastStatus('DEPARTING HQ')">Departing HQ</button>
            <button class="btn btn-status btn-scene" onclick="broadcastStatus('ON SCENE')">On Scene</button>
            <button class="btn btn-status btn-scene" onclick="broadcastStatus('DEPARTING SCENE')">Departing Scene</button>
            <button class="btn btn-status btn-hq" onclick="broadcastStatus('AT HQ / STAND DOWN')">At HQ / Stand Down</button>
        </div>

        <button class="dispatch-btn" onclick="sendToSupabase()">SEND LIVE DISPATCH</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <label style="margin:0;">Mission Log</label>
            <button class="btn" style="padding:4px 8px; width:auto; border-color:#522; color:var(--red);" onclick="clearLogs()">CLEAR</button>
        </div>
        <table class="log-table"><tbody id="log-body"></tbody></table>
    </div>

<script>
    const supabaseUrl = 'https://jcctioskmhikksydvqdh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjY3Rpb3NrbWhpa2tzeWR2cWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTIyMTMsImV4cCI6MjA5NDE4ODIxM30.TsMbLVFse5S-_DoYyZrT1hDnaKbWacdofvNrOu15C98';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let selectedUnit = "";
    let selectedType = "";
    let selectedTrap = "";
    let selectedCas = "0";
    let opLogs = JSON.parse(localStorage.getItem('rv_op_logs')) || [];

    function playAlert() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1); 
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
    }

    function setUnit(val, btn) {
        selectedUnit = val;
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setType(val, btn) {
        selectedType = val;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setTrap(val, btn) {
        if(selectedTrap === val) {
            selectedTrap = ""; btn.classList.remove('active');
        } else {
            selectedTrap = val;
            document.querySelectorAll('.trap-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }

    function setCas(val, btn) {
        selectedCas = val;
        document.querySelectorAll('.cas-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function sendOnlyNote() {
        const notes = document.getElementById('other-info').value;
        if (!selectedUnit) return alert("Select Unit First");
        if (!notes) return alert("Enter a note first");

        const entry = `${selectedUnit} (NOTE): ${notes}`;
        saveLog(entry);

        await _supabase.from('incidents').insert([{ 
            units: selectedUnit, 
            type: 'NOTE', 
            notes: notes 
        }]);

        document.getElementById('other-info').value = "";
    }

    async function broadcastStatus(msg) {
        if (!selectedUnit) return alert("Select Unit First");
        const entry = `${selectedUnit}: ${msg}`;
        saveLog(entry);
        await _supabase.from('incidents').insert([{ units: selectedUnit, type: 'STATUS', notes: msg }]);
    }

   async function sendToSupabase() {
        if (!selectedUnit || !selectedType) return alert("Select Unit & Rescue Type");
        const notes = document.getElementById('other-info').value;
        
        let entry = `${selectedUnit} | ${selectedType} | Cas: ${selectedCas}${selectedTrap ? ' | ' + selectedTrap : ''}`;
        if (notes) entry += ` | Notes: ${notes}`;

        saveLog(entry);

        const { error } = await _supabase.from('incidents').insert([{ 
            units: selectedUnit, 
            type: selectedType, 
            entrapment: selectedTrap, 
            casualties: selectedCas, 
            notes: notes 
        }]);

        if (!error) {
            document.getElementById('other-info').value = "";
            selectedType = ""; 
            selectedTrap = "";
            document.querySelectorAll('.type-btn, .trap-btn').forEach(b => b.classList.remove('active'));
        }
    }

    function saveLog(msg) {
        playAlert();
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        opLogs.unshift({time, status: msg});
        localStorage.setItem('rv_op_logs', JSON.stringify(opLogs));
        renderLogs();
    }

    const channel = _supabase
      .channel('public:incidents')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'incidents' }, (payload) => {
          playAlert(); 
          const newItem = payload.new;
          
          let statusMsg = "";
          if (newItem.type === 'STATUS' || newItem.type === 'NOTE') {
              statusMsg = `${newItem.units}: ${newItem.notes}`;
          } else {
              statusMsg = `${newItem.units} | ${newItem.type} | Cas: ${newItem.casualties}${newItem.notes ? ' | Notes: ' + newItem.notes : ''}`;
          }
          
          const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          opLogs.unshift({time, status: statusMsg});
          renderLogs();
      })
      .subscribe();
// Add this under your supabase initialization
_supabase.channel('system_check')
  .subscribe((status, err) => {
    if (status === 'CHANNEL_ERROR') {
      // This will tell you if it's a 401 (Wrong Key) or 404 (Wrong URL)
      alert("Connection Error: " + status + ". Check the console for details.");
      console.error(err);
     }
  });
    function renderLogs() {
        document.getElementById('log-body').innerHTML = opLogs.slice(0, 10).map(l => `
            <tr><td style="color:#8899ac; width:50px;">${l.time}</td><td>${l.status}</td></tr>
        `).join('');
    }

    function clearLogs() {
        if(confirm("Clear logs?")) { opLogs = []; localStorage.removeItem('rv_op_logs'); renderLogs(); }
    }

    renderLogs();
</script>
</body>
</html>
