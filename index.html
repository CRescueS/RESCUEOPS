<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RescueLog Pro | Mobile Command</title>
    <style>
        :root {
            --safety-orange: #FF6B00;
            --danger: #FF4444;
            --success: #00C851;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #eee;
            --sidebar-width: 260px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar & Mobile Hamburger Logic */
        .sidebar { 
            width: var(--sidebar-width); 
            background: #000; 
            border-right: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.3s ease;
            z-index: 100;
        }

        /* Mobile Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 90;
        }

        /* Hamburger Menu Icon */
        .hamburger {
            display: none;
            cursor: pointer;
            padding: 15px;
            z-index: 110;
            background: #111;
            border-bottom: 1px solid #333;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--safety-orange);
            margin: 5px 0;
            transition: 0.4s;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .hamburger { display: block; position: sticky; top: 0; }
            .header { padding-top: 10px; }
            .stats-grid { grid-template-columns: 1fr; }
        }

        .nav-brand { padding: 25px; font-weight: 800; color: var(--safety-orange); border-bottom: 1px solid #222; font-size: 0.85rem; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; transition: 0.2s; border-left: 4px solid transparent; font-size: 0.9rem; }
        .nav-item.active { color: #fff; background: #111; border-left-color: var(--safety-orange); }

        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .header { padding: 20px 30px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .container { padding: 20px; flex: 1; }

        .table-wrap { background: var(--card-bg); border-radius: 12px; overflow-x: auto; border: 1px solid #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { text-align: left; background: #222; padding: 12px; font-size: 0.7rem; color: var(--safety-orange); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.8rem; }
        
        .btn { background: var(--safety-orange); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar">
    <div class="nav-brand">CASINO RESCUE COMMAND</div>
    <div class="nav-item active" onclick="nav('dash')">📊 Squad Status</div>
    <div class="nav-item" onclick="nav('training')">🧗 VR Training Log</div>
    <div class="nav-item" onclick="nav('hardware')">⚙️ Hardware Registry</div>
    <div class="nav-item" onclick="nav('crew')">👥 Crew & Vehicle Kits</div>
</div>

<div class="main">
    <!-- Hamburger for Mobile -->
    <div class="hamburger" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="header">
        <h2 id="view-title" style="font-size: 1.1rem; margin: 0;">Squad Status</h2>
    </div>

    <div class="container">
        <!-- Dashboard View -->
        <div id="view-dash">
            <button class="btn" onclick="openAddCrewModal()">+ ADD OPERATOR</button>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Callsign</th><th>Status</th><th>Edit</th></tr></thead>
                    <tbody id="status-body"></tbody>
                </table>
            </div>
        </div>
        <!-- Other views (training, hardware, crew) remain consistent -->
    </div>
</div>

<script>
    // Navigation and Mobile Toggle Logic
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function nav(target) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('view-' + target).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        // Mobile-specific: close menu on selection
        if (window.innerWidth <= 768) toggleMenu();
        
        document.getElementById('view-title').innerText = target.toUpperCase();
        render();
    }

    // Interoperability Logic: LocalStorage is shared across the same domain/IP
    let crewData = JSON.parse(localStorage.getItem('rv_crew')) || [
        { name: "Operator 1", callsign: "Alpha", role: "Lead" }
    ];

    function render() {
        const sixMo = new Date(); sixMo.setMonth(sixMo.getMonth() - 6);
        
        // Optimized Table for Mobile Phone screens
        document.getElementById('status-body').innerHTML = crewData.map((c, i) => {
            const isCurrent = true; // Placeholder for logic
            return `<tr>
                <td><strong>${c.callsign}</strong></td>
                <td><span style="color:${isCurrent ? 'var(--success)' : 'var(--danger)'}">●</span></td>
                <td><button onclick="openEditCrewModal(${i})" style="background:none; border:1px solid #444; color:#fff; padding:4px 8px; border-radius:4px;">EDIT</button></td>
            </tr>`;
        }).join('');
    }

    window.onload = render;
</script>
</body>
</html>
