<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RescueLog Pro | Casino Rescue Squad</title>
    <style>
        :root {
            --safety-orange: #FF6B00;
            --safety-yellow: #FFD700;
            --dark-bg: #0a0a0a;
            --sidebar-bg: #000000;
            --card-bg: rgba(26, 26, 26, 0.95);
            --text-main: #FFFFFF;
            --danger: #FF4444;
            --success: #00C851;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Responsive Watermark */
        #watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 600px;
            height: auto;
            aspect-ratio: 1/1;
            background-image: url('1121.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar & Mobile Toggle */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .nav-brand { padding: 20px; font-weight: 800; color: var(--safety-orange); border-bottom: 1px solid #222; font-size: 0.9rem; }
        .nav-item { padding: 18px 20px; cursor: pointer; color: #888; border-left: 4px solid transparent; font-size: 1rem; }
        .nav-item.active { color: var(--safety-orange); background: rgba(255, 107, 0, 0.1); border-left-color: var(--safety-orange); }

        .viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 5; }
        
        .top-bar { 
            background: rgba(26, 26, 26, 0.98); 
            padding: 12px 15px; 
            border-bottom: 2px solid var(--safety-orange); 
            display: flex; 
            align-items: center; 
            gap: 15px;
        }

        .menu-btn { display: none; background: none; border: none; color: white; font-size: 1.5rem; padding: 0; cursor: pointer; }

        .main-content { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card h3 { margin: 0 0 5px 0; color: var(--safety-yellow); font-size: 1rem; }
        
        .item-row { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }

        /* Mobile specific styles */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: block; }
            .nav-brand { font-size: 1.1rem; }
            #watermark { left: 50%; opacity: 0.07; }
        }

        .btn { background: var(--safety-orange); color: white; border: none; padding: 12px 18px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
        .btn-sm { padding: 10px; background: #333; border: none; color: white; border-radius: 6px; font-size: 0.8rem; min-width: 44px; min-height: 44px; }
        
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; border: 1px solid; }
        
        /* Modal Tuning for Mobile */
        .modal-content { width: 90%; max-width: 380px; margin: 20vh auto; padding: 20px; box-sizing: border-box; }
        input, select { font-size: 16px !important; /* Prevents iOS zoom on focus */ padding: 12px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="watermark"></div>

    <div class="sidebar" id="sidebar">
        <div class="nav-brand">CASINO RESCUE SQUAD</div>
        <div class="nav-item active" onclick="showSec('fleet')">🚑 Fleet</div>
        <div class="nav-item" onclick="showSec('crew')">👥 Crew</div>
        <div class="nav-item" onclick="showSec('hardware')">⚙️ Hardware</div>
        <div class="nav-item" onclick="showSec('kits')">📦 Kits</div>
        <div style="margin-top:auto; padding:20px; font-size:0.7rem; color:#444;">RESCUELOG PRO V2.0</div>
    </div>

    <div class="viewport">
        <div class="top-bar">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <strong id="view-title" style="flex:1">FLEET OPS</strong>
            <button class="btn" onclick="openModal('vModal')" style="padding: 8px 12px;">+</button>
        </div>

        <div class="main-content">
            <section id="sec-fleet"><div class="grid" id="fleetGrid"></div></section>
            <section id="sec-crew" class="hidden">
                <div class="grid" id="crewGrid"></div>
                <div class="card" style="margin-top: 20px;">
                    <h3>Timeline</h3>
                    <div id="opsLog" style="font-family: monospace; font-size: 0.8rem; color: #aaa; line-height: 1.5;"></div>
                </div>
            </section>
            <section id="sec-hardware" class="hidden">
                <div class="card"><h3>Inspection Registry</h3><div id="hardwareList"></div></div>
            </section>
            <section id="sec-kits" class="hidden"><div class="grid" id="kitGrid"></div></section>
        </div>
    </div>

    <div id="vModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Entry Configuration</h3>
            <input type="text" id="input1" placeholder="Name">
            <input type="text" id="input2" placeholder="Detail (Role/Plate/Expiry)">
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn" style="flex:1" onclick="handleModalSubmit()">SAVE</button>
                <button class="btn" style="flex:1; background:#444" onclick="closeModal('vModal')">X</button>
            </div>
        </div>
    </div>

<script>
    let vehicles = [], crew = [], kits = [], hardware = [], operationalLogs = [];
    let currentSection = 'fleet';

    window.onload = () => { loadData(); renderAll(); };

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function saveData() { localStorage.setItem('rescueLogPro_Data', JSON.stringify({ vehicles, crew, kits, hardware, operationalLogs })); }

    function loadData() {
        const saved = localStorage.getItem('rescueLogPro_Data');
        if (saved) {
            const parsed = JSON.parse(saved);
            vehicles = parsed.vehicles || []; crew = parsed.crew || [];
            kits = parsed.kits || []; hardware = parsed.hardware || [];
            operationalLogs = parsed.operationalLogs || [];
        } else {
            vehicles = [{ id: 'V1', name: 'SQUAD-01', plate: 'CRS-2026' }];
            crew = [{ id: 'C1', name: 'Lead Tech', role: 'Vertical Lead', status: 'Standby' }];
            hardware = [{ id: 'H1', name: 'Edelrid Vertic II', expiry: '2026-05' }];
            kits = [{ id: 'K1', name: 'Main Rope Kit', items: ['Edelrid Vertic II'] }];
            saveData();
        }
    }

    function quickStatus(id, newStatus) {
        const member = crew.find(x => x.id === id);
        if (member) {
            member.status = newStatus;
            operationalLogs.unshift({ time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), name: member.name, action: newStatus });
            saveData(); renderAll();
        }
    }

    function renderCrew() {
        const grid = document.getElementById('crewGrid');
        grid.innerHTML = crew.map(c => `
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div><h3>${c.name}</h3><span style="font-size:0.8rem; color:#777">${c.role}</span></div>
                    <div class="status-pill" style="color:${getStatusColor(c.status)}; border-color:${getStatusColor(c.status)}">${c.status}</div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px;">
                    <button class="btn-sm" onclick="quickStatus('${c.id}', 'Departing HQ')">🚀 DEP</button>
                    <button class="btn-sm" onclick="quickStatus('${c.id}', 'On Scene')">📍 SCN</button>
                    <button class="btn-sm" onclick="quickStatus('${c.id}', 'RTB')">🚒 RTB</button>
                    <button class="btn-sm" onclick="quickStatus('${c.id}', 'Standby')">💤 STB</button>
                </div>
            </div>`).join('');
    }

    function renderHardware() {
        const list = document.getElementById('hardwareList');
        list.innerHTML = hardware.map(h => `
            <div class="item-row" style="border-left: 4px solid var(--safety-orange)">
                <span>${h.name} <br><small style="color:#666">EXP: ${h.expiry}</small></span>
                <button class="btn-sm" style="background:transparent; color:#444" onclick="deleteEntry('hardware', '${h.id}')">🗑️</button>
            </div>`).join('');
    }

    function renderFleet() {
        const grid = document.getElementById('fleetGrid');
        grid.innerHTML = vehicles.map(v => `<div class="card"><h3>${v.name}</h3><span style="color:#666">${v.plate}</span></div>`).join('');
    }

    function renderLog() {
        document.getElementById('opsLog').innerHTML = operationalLogs.map(l => `<div>[${l.time}] ${l.name}: ${l.action}</div>`).join('') || "No logs.";
    }

    function renderKits() {
        const grid = document.getElementById('kitGrid');
        grid.innerHTML = kits.map(k => `
            <div class="card">
                <h3>${k.name}</h3>
                <div style="margin: 10px 0;">
                    ${k.items.map(i => `<div class="item-row" style="padding:8px"><span>${i}</span></div>`).join('')}
                </div>
                <select onchange="addToKit('${k.id}', this.value); this.value='';">
                    <option value="">+ Add Gear</option>
                    ${hardware.map(h => `<option value="${h.name}">${h.name}</option>`).join('')}
                </select>
            </div>`).join('');
    }

    function showSec(sec) {
        currentSection = sec;
        document.getElementById('view-title').innerText = sec.toUpperCase();
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(`sec-${sec}`).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.innerText.toLowerCase().includes(sec)));
        if(window.innerWidth < 768) toggleMenu();
        renderAll();
    }

    function renderAll() { renderFleet(); renderCrew(); renderHardware(); renderKits(); renderLog(); }
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function getStatusColor(s) { return s === 'On Scene' ? 'var(--danger)' : s === 'Standby' ? 'var(--success)' : 'var(--safety-orange)'; }
    function addToKit(kitId, item) { const k = kits.find(x => x.id === kitId); if (k && !k.items.includes(item)) { k.items.push(item); saveData(); renderAll(); } }

    function handleModalSubmit() {
        const v1 = document.getElementById('input1').value.trim();
        const v2 = document.getElementById('input2').value.trim();
        if(!v1) return;
        const newId = Date.now().toString();
        if(currentSection === 'fleet') vehicles.push({ id: 'V'+newId, name: v1, plate: v2 });
        if(currentSection === 'crew') crew.push({ id: 'C'+newId, name: v1, role: v2, status: 'Standby' });
        if(currentSection === 'hardware') hardware.push({ id: 'H'+newId, name: v1, expiry: v2 });
        if(currentSection === 'kits') kits.push({ id: 'K'+newId, name: v1, items: [] });
        saveData(); closeModal('vModal'); renderAll();
    }

    function deleteEntry(type, id) {
        if(!confirm("Delete?")) return;
        if(type === 'hardware') hardware = hardware.filter(x => x.id !== id);
        saveData(); renderAll();
    }
</script>
</body>
</html>
