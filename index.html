<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RescueLog Pro | Mission Command</title>
    <style>
        :root {
            --safety-orange: #FF6B00;
            --danger: #FF4444;
            --success: #00C851;
            --info: #0099CC;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #eee;
            --sidebar-width: 260px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1000; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 900; }
        .hamburger { display: none; cursor: pointer; padding: 15px; z-index: 1100; background: #111; border-bottom: 1px solid #333; }
        .hamburger div { width: 25px; height: 3px; background-color: var(--safety-orange); margin: 5px 0; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .hamburger { display: block; position: sticky; top: 0; }
        }

        .nav-brand { padding: 25px; font-weight: 800; color: var(--safety-orange); border-bottom: 1px solid #222; font-size: 0.85rem; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; border-left: 4px solid transparent; font-size: 0.9rem; }
        .nav-item.active { color: #fff; background: #111; border-left-color: var(--safety-orange); }

        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .header { padding: 15px 25px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; flex: 1; }

        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .log-btn { padding: 20px; border: none; border-radius: 8px; font-weight: 800; font-size: 0.9rem; cursor: pointer; color: #000; text-transform: uppercase; transition: 0.1s; }
        .btn-hq { background: var(--info); }
        .btn-scene { background: var(--safety-orange); }
        .btn-clear { background: var(--success); }
        .btn-standby { background: #666; color: #fff; }
        .log-btn:active { transform: scale(0.98); opacity: 0.8; }

        .table-wrap { background: var(--card-bg); border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th { text-align: left; background: #222; padding: 10px; font-size: 0.7rem; color: var(--safety-orange); }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.85rem; font-family: 'Courier New', monospace; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar">
    <div class="nav-brand">CASINO RESCUE COMMAND</div>
    <div class="nav-item" onclick="nav('dash')">📊 Squad Status</div>
    <div class="nav-item active" onclick="nav('oplog')">⏱️ Operational Log</div>
    <div class="nav-item" onclick="nav('training')">🧗 Training Log</div>
    <div class="nav-item" onclick="nav('hardware')">⚙️ Hardware</div>
    <div class="nav-item" onclick="nav('crew')">👥 Kits</div>
</div>

<div class="main">
    <div class="hamburger" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="header">
        <h2 id="view-title" style="font-size: 1rem; margin:0;">OPERATIONAL LOG</h2>
    </div>

    <div class="container">
        <!-- Operational Log View -->
        <div id="view-oplog">
            <div class="btn-grid">
                <button class="log-btn btn-hq" onclick="stamp('DEPARTING HQ')">Departing HQ</button>
                <button class="log-btn btn-scene" onclick="stamp('ON SCENE')">On Scene</button>
                <button class="log-btn btn-scene" onclick="stamp('DEPARTING SCENE')">Departing Scene</button>
                <button class="log-btn btn-hq" onclick="stamp('AT HQ / SHUTDOWN')">At HQ / Shutting Down</button>
                <button class="log-btn btn-standby" onclick="stamp('STANDBY')">Standby</button>
            </div>
            
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Timestamp</th><th>Event Status</th></tr></thead>
                    <tbody id="op-log-body"></tbody>
                </table>
            </div>
            <button onclick="clearOpLog()" style="margin-top:20px; background:none; border:1px solid #444; color:#888; padding:8px; border-radius:4px; width:100%; cursor:pointer;">Clear Mission Log</button>
        </div>

        <!-- Placeholder for other views -->
        <div id="view-dash" class="hidden"><p>Squad currency and status data.</p></div>
        <div id="view-training" class="hidden"><p>VR Training logs.</p></div>
        <div id="view-hardware" class="hidden"><p>Arizona Vortex and gear registry.</p></div>
        <div id="view-crew" class="hidden"><p>Personal and Vehicle kit breakdowns.</p></div>
    </div>
</div>

<script>
    let opLogs = JSON.parse(localStorage.getItem('rv_op_logs')) || [];

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function nav(target) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('view-' + target).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (window.innerWidth <= 768) toggleMenu();
        document.getElementById('view-title').innerText = target.toUpperCase().replace('OPLOG', 'OPERATIONAL LOG');
        render();
    }

    function stamp(status) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        const dateStr = now.toLocaleDateString();
        
        opLogs.unshift({ time: `${dateStr} ${timeStr}`, status: status });
        localStorage.setItem('rv_op_logs', JSON.stringify(opLogs));
        render();
    }

    function clearOpLog() {
        if(confirm("Archive and clear current mission timestamps?")) {
            opLogs = [];
            localStorage.setItem('rv_op_logs', JSON.stringify(opLogs));
            render();
        }
    }

    function render() {
        const logBody = document.getElementById('op-log-body');
        if(logBody) {
            logBody.innerHTML = opLogs.map(l => `
                <tr>
                    <td>${l.time}</td>
                    <td style="font-weight:bold; color:var(--safety-orange)">${l.status}</td>
                </tr>
            `).join('');
        }
    }

    window.onload = render;
</script>
</body>
</html>
