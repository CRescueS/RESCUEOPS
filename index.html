<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueLog Pro | Casino Rescue Squad</title>
    <style>
        :root {
            --safety-orange: #FF6B00;
            --danger: #FF4444;
            --warning: #FFD700;
            --success: #00C851;
            --dark-bg: #0d0d0d;
            --card-bg: rgba(26, 26, 26, 0.9); /* Slight transparency for watermark */
            --text: #eee;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--dark-bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* Watermark Implementation */
        .watermark {
            position: fixed;
            top: 50%;
            left: 57%; /* Offset for sidebar */
            transform: translate(-50%, -50%);
            width: 60vh;
            height: auto;
            opacity: 0.3; /* Subtle background presence */
            z-index: -1;
            pointer-events: none;
        }
        
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .nav-brand { padding: 25px; font-weight: 800; color: var(--safety-orange); border-bottom: 1px solid #222; font-size: 0.85rem; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #888; transition: 0.2s; border-left: 4px solid transparent; font-size: 0.9rem; }
        .nav-item.active { color: #fff; background: #111; border-left-color: var(--safety-orange); }

        .main { flex: 1; overflow-y: auto; position: relative; }
        .header { padding: 20px 30px; background: rgba(17, 17, 17, 0.95); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(5px); }
        .container { padding: 30px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 8px; border-bottom: 3px solid var(--safety-orange); backdrop-filter: blur(5px); }
        .stat-val { font-size: 1.8rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-top: 5px; }

        .table-wrap { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #333; margin-bottom: 30px; backdrop-filter: blur(10px); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: rgba(34, 34, 34, 0.8); padding: 15px; font-size: 0.75rem; color: var(--safety-orange); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        
        .pill { padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .btn { background: var(--safety-orange); color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-danger { background: var(--danger); color: #fff; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer; }
        .btn-ghost { background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .hidden { display: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { width: 480px; background: #1a1a1a; margin: 50px auto; padding: 30px; border-radius: 12px; border: 1px solid var(--safety-orange); max-height: 85vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<!-- Watermark Image -->
<img src="ChatGPT Image Mar 31, 2026, 12_52_43 PM.jpg" class="watermark" alt="Squad Logo">
<div class="sidebar">
    <div class="nav-brand">CASINO RESCUE COMMAND</div>
    <div class="nav-item active" onclick="nav('dash')">📊 Squad Status</div>
    <div class="nav-item" onclick="nav('training')">🧗 VR Training Log</div>
    <div class="nav-item" onclick="nav('hardware')">⚙️ Hardware Registry</div>
    <div class="nav-item" onclick="nav('crew')">👥 Crew & Vehicle Kits</div>
</div>

<div class="main">
    <div class="header">
        <h2 id="view-title">Squad Status</h2>
        <div>
            <button class="btn-ghost" onclick="openAddCrewModal()">+ ADD OPERATOR</button>
            <button class="btn" onclick="openModal('regModal')">+ REGISTER ASSET</button>
        </div>
    </div>

    <div class="container">
        <div id="view-dash">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-val" id="count-current">0</span><span class="stat-label">Current Personnel</span></div>
                <div class="stat-card"><span class="stat-val" id="count-total-hw">0</span><span class="stat-label">Total Assets</span></div>
            </div>
            <h3>Operator Currency</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Name</th><th>Callsign</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="status-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-training" class="hidden">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Date</th><th>Operator</th><th>Skills Covered</th></tr></thead>
                    <tbody id="train-log-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-hardware" class="hidden">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Asset</th><th>Assignment</th><th>Type</th><th>Lifespan</th></tr></thead>
                    <tbody id="hw-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-crew" class="hidden">
            <div id="vehicle-kit-container"></div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 40px 0;">
            <div id="crew-kit-container"></div>
        </div>
    </div>
</div>

<!-- Modals (Add/Edit Crew, Register Asset) remain functionally the same -->
<div id="crewModal" class="modal">
    <div class="modal-content">
        <h3 id="crew-modal-title">Operator Profile</h3>
        <input type="hidden" id="c-idx">
        <input type="text" id="c-name" placeholder="Full Name">
        <input type="text" id="c-callsign" placeholder="Callsign (No I, T, D, M)">
        <input type="text" id="c-role" placeholder="Role (e.g. Lead Tech)">
        <button class="btn" style="width:100%" onclick="saveCrew()">SAVE PROFILE</button>
        <button id="delete-btn" class="btn-danger" style="width:100%; margin-top:10px; display:none;" onclick="deleteCrew()">DELETE PROFILE</button>
        <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="closeModal('crewModal')">CANCEL</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h3>Asset Registration</h3>
        <input type="text" id="in-name" placeholder="Item Name (e.g. Arizona Vortex)">
        <input type="date" id="in-dom">
        <select id="in-owner"></select>
        <select id="in-type">
            <option value="textile">Textile (10yr)</option>
            <option value="metal">Metal Hardware</option>
            <option value="vehicle">Vehicle Based (Team Kit)</option>
        </select>
        <button class="btn" style="width:100%" onclick="saveAsset()">REGISTER</button>
        <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="closeModal('regModal')">CANCEL</button>
    </div>
</div>

<script>
    let assets = JSON.parse(localStorage.getItem('rv_assets')) || [];
    let trainingLogs = JSON.parse(localStorage.getItem('rv_training')) || [];
    let crewData = JSON.parse(localStorage.getItem('rv_crew')) || [
        { name: "Operator 1", callsign: "Alpha", role: "Lead" }
    ];

    function nav(target) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('view-' + target).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(window.event) window.event.target.classList.add('active');
        document.getElementById('view-title').innerText = target.toUpperCase();
        render();
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function openAddCrewModal() {
        document.getElementById('c-idx').value = "";
        document.getElementById('c-name').value = "";
        document.getElementById('c-callsign').value = "";
        document.getElementById('c-role').value = "";
        document.getElementById('delete-btn').style.display = 'none';
        openModal('crewModal');
    }

    function openEditCrewModal(idx) {
        const c = crewData[idx];
        document.getElementById('c-idx').value = idx;
        document.getElementById('c-name').value = c.name;
        document.getElementById('c-callsign').value = c.callsign;
        document.getElementById('c-role').value = c.role;
        document.getElementById('delete-btn').style.display = 'block';
        openModal('crewModal');
    }

    function saveCrew() {
        const idx = document.getElementById('c-idx').value;
        const callsign = document.getElementById('c-callsign').value.trim().toUpperCase();
        if (['INDIA', 'TANGO', 'DELTA', 'MIKE'].includes(callsign)) return alert("Restricted Protocol.");

        const data = { name: document.getElementById('c-name').value, callsign, role: document.getElementById('c-role').value };
        if (idx === "") crewData.push(data);
        else crewData[idx] = data;

        localStorage.setItem('rv_crew', JSON.stringify(crewData));
        closeModal('crewModal');
        render();
    }

    function deleteCrew() {
        const idx = document.getElementById('c-idx').value;
        if(confirm("Confirm deletion?")) {
            crewData.splice(idx, 1);
            localStorage.setItem('rv_crew', JSON.stringify(crewData));
            closeModal('crewModal');
            render();
        }
    }

    function saveAsset() {
        assets.push({ 
            name: document.getElementById('in-name').value, 
            dom: document.getElementById('in-dom').value, 
            owner: document.getElementById('in-owner').value, 
            type: document.getElementById('in-type').value 
        });
        localStorage.setItem('rv_assets', JSON.stringify(assets));
        closeModal('regModal');
        render();
    }

    function render() {
        const sixMo = new Date(); sixMo.setMonth(sixMo.getMonth() - 6);
        let currentCount = 0;

        const opOpts = crewData.map(c => `<option value="${c.callsign}">${c.callsign}</option>`).join('');
        document.getElementById('in-owner').innerHTML = '<option value="VEHICLE">VEHICLE/TEAM</option>' + opOpts;

        document.getElementById('status-body').innerHTML = crewData.map((c, i) => {
            const lastT = trainingLogs.find(l => l.op === c.callsign);
            const isCurrent = lastT && new Date(lastT.date) >= sixMo;
            if(isCurrent) currentCount++;
            return `<tr><td>${c.name}</td><td>${c.callsign}</td><td><span class="pill" style="background:${isCurrent ? 'var(--success)' : 'var(--danger)'}">${isCurrent ? 'CURRENT' : 'EXPIRED'}</span></td><td><button class="btn-ghost" onclick="openEditCrewModal(${i})">EDIT</button></td></tr>`;
        }).join('');

        document.getElementById('hw-body').innerHTML = assets.map(a => `<tr><td>${a.name}</td><td>${a.owner}</td><td>${a.type}</td><td>VALID</td></tr>`).join('');

        const vGear = assets.filter(a => a.owner === "VEHICLE");
        document.getElementById('vehicle-kit-container').innerHTML = `
            <div class="table-wrap" style="border: 1px solid var(--safety-orange)">
                <div style="padding:15px; background:rgba(255,107,0,0.1); font-weight:bold;">🚛 VEHICLE-BASED ASSETS (TEAM KIT)</div>
                <table>${vGear.map(g => `<tr><td>${g.name}</td><td style="text-align:right">Type: ${g.type}</td></tr>`).join('')}</table>
            </div>`;

        document.getElementById('crew-kit-container').innerHTML = crewData.map(c => {
            const kit = assets.filter(a => a.owner === c.callsign);
            return `<div class="table-wrap">
                <div style="padding:15px; background:#222;"><strong>${c.callsign}</strong> | ${c.name}</div>
                <table>${kit.map(g => `<tr><td>${g.name}</td><td style="text-align:right">${g.dom}</td></tr>`).join('')}</table>
            </div>`;
        }).join('');

        document.getElementById('count-current').innerText = currentCount;
        document.getElementById('count-total-hw').innerText = assets.length;
    }
    window.onload = render;
</script>
</body>
</html>
