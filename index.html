<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RescueLog Pro | Casino Rescue Squad</title>
    <style>
        :root {
            --safety-orange: #FF6B00; --danger: #FF4444; --success: #00C851;
            --info: #0099CC; --dark-bg: #0d0d0d; --card-bg: #1a1a1a; --text: #eee;
        }
        body.night-mode { --safety-orange: #ff0000; --info: #aa0000; --success: #880000; --text: #ff0000; }
        body.night-mode .log-btn, body.night-mode .sidebar, body.night-mode .table-wrap, body.night-mode .avpu-btn { border: 1px solid #ff0000 !important; }
        body.night-mode #splash-screen img, body.night-mode .sidebar-logo img { filter: grayscale(1) sepia(1) hue-rotate(-50deg) saturate(5); }

        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #splash-screen img { width: 220px; height: auto; border-radius: 20px; margin-bottom: 20px; }
        .splash-hidden { opacity: 0; visibility: hidden; }

        .sidebar-logo { padding: 25px 20px 10px 20px; text-align: center; border-bottom: 1px solid #222; }
        .sidebar-logo img { width: 100px; height: auto; border-radius: 8px; }

        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 1000; transition: transform 0.3s ease; }
        .nav-brand { padding: 15px 20px; font-weight: 800; color: var(--safety-orange); border-bottom: 1px solid #222; font-size: 0.75rem; letter-spacing: 1px; display:flex; justify-content: space-between; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #888; border-left: 4px solid transparent; font-size: 0.85rem; }
        .nav-item.active { color: #fff; background: #111; border-left-color: var(--safety-orange); }

        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .header { padding: 12px 20px; background: #111; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center;}
        .container { padding: 15px; padding-bottom: 80px; }
        
        .table-wrap { background: var(--card-bg); border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; overflow: hidden; }
        .log-btn { padding: 14px; border: none; border-radius: 8px; font-weight: 800; width: 100%; margin-bottom: 8px; text-transform: uppercase; cursor: pointer; font-size: 0.75rem; transition: 0.1s; }
        .btn-hq { background: var(--info); color: white; }
        .btn-scene { background: var(--safety-orange); color: black; }
        .btn-standby { background: #222; color: #888; border: 1px solid #333; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger) !important; }
        
        .avpu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .avpu-btn { background: #222; border: 1px solid #444; color: #888; padding: 10px 5px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; text-align: center; }
        .avpu-btn.active { background: var(--safety-orange); color: black; border-color: var(--safety-orange); }

        textarea, input, select { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 4px; box-sizing: border-box; font-family: inherit; margin-top: 5px; }
        label { font-size: 0.65rem; font-weight: bold; color: var(--safety-orange); display: block; margin-top: 10px; text-transform: uppercase; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid var(--safety-orange); width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        
        .triage-card { padding: 10px; margin-bottom: 5px; border-radius: 4px; font-weight: bold; color: black; font-size: 0.75rem; }

        .hidden { display: none !important; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .hamburger { display: block !important; padding: 15px; background: #111; cursor: pointer; color: var(--safety-orange); }
        }
    </style>
</head>
<body>

<div id="splash-screen"><img src="1121.jpg"></div>

<div id="sidebar" class="sidebar">
    <div class="sidebar-logo"><img src="1121.jpg"></div>
    <div class="nav-brand">CASINO RESCUE <span onclick="toggleNight()" style="cursor:pointer">👁️</span></div>
    <div id="nav-oplog" class="nav-item active" onclick="nav('oplog')">⏱️ MISSION LOG</div>
    <div id="nav-smeacs" class="nav-item" onclick="nav('smeacs')">📋 SMEACS BRIEF</div>
    <div id="nav-checklists" class="nav-item" onclick="nav('checklists')">✅ CHECKLISTS</div>
    <div id="nav-dash" class="nav-item" onclick="nav('dash')">👥 SQUAD & KITS</div>
    <div id="nav-medref" class="nav-item" onclick="nav('medref')">🏥 MEDICAL / IMIST</div>
    <div id="nav-others" class="nav-item" onclick="nav('others')">📁 ALL OTHERS / MA</div>
</div>

<div class="main">
    <div class="hamburger" id="ham-btn" onclick="toggleMenu()" style="display:none;">☰ MENU</div>
    <div class="header"><h2 id="view-title" style="margin:0; font-size:0.9rem; letter-spacing:1px;">MISSION LOG</h2></div>

    <div class="container">
        <div id="view-oplog" class="view-section">
            <button class="log-btn btn-hq" onclick="stamp('DEPARTING HQ')">Departing HQ</button>
            <button class="log-btn btn-scene" onclick="stamp('ON SCENE')">On Scene</button>
            <button class="log-btn btn-scene" onclick="stamp('DEPARTING SCENE')">Departing Scene</button>
            <button class="log-btn btn-standby" onclick="openHotDebrief()">Hot Debrief</button>
            <button class="log-btn btn-hq" onclick="stamp('AT HQ / SHUTTING DOWN')">At HQ / SHUTTING down</button>
            <div class="table-wrap"><table style="width:100%"><tbody id="op-log-body"></tbody></table></div>
            <button class="log-btn btn-danger" onclick="clearLogs()">CLEAR LOG</button>
        </div>

        <div id="view-smeacs" class="view-section hidden">
            <div class="table-wrap" style="padding:15px;">
                <label>SMEACS BRIEFING</label>
                <textarea id="sm-s" placeholder="Situation"></textarea>
                <textarea id="sm-m" placeholder="Mission (L.A.S.T)"></textarea>
                <textarea id="sm-e" placeholder="Execution"></textarea>
                <textarea id="sm-a" placeholder="Admin/Logistics"></textarea>
                <textarea id="sm-c" placeholder="Comms/Command"></textarea>
                <textarea id="sm-safety" placeholder="Safety/Alternates"></textarea>
            </div>
        </div>

        <div id="view-checklists" class="view-section hidden">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <button class="log-btn btn-hq" onclick="renderChecklist('vertical')">Vertical / ARCHER</button>
                <button class="log-btn btn-hq" onclick="renderChecklist('roadcrash')">Road Crash</button>
                <button class="log-btn btn-hq" onclick="renderChecklist('hazmat')">Hazmat</button>
                <button class="log-btn btn-hq" onclick="renderChecklist('landzone')">Landing Zone</button>
                <button class="log-btn btn-hq" style="grid-column: span 2;" onclick="renderChecklist('safetycheatsheet')">Safety Cheat Sheet</button>
            </div>
            <div id="checklist-container" class="table-wrap"></div>
        </div>

        <div id="view-dash" class="view-section hidden">
            <button class="log-btn btn-scene" onclick="addOperator()">+ ADD OPERATOR</button>
            <div id="squad-list"></div>
        </div>

        <div id="view-medref" class="view-section hidden">
            <label>IMIST-AMBO HANDOVER</label>
            <div class="table-wrap" style="padding:15px;">
                <input type="text" id="im-i" placeholder="I - Identification">
                <input type="text" id="im-m" placeholder="M - Mechanism">
                <input type="text" id="im-inj" placeholder="I - Injuries">
                
                <label>AVPU STATUS</label>
                <div class="avpu-grid">
                    <div class="avpu-btn" id="avpu-a" onclick="setAVPU('ALERT')">A</div>
                    <div class="avpu-btn" id="avpu-v" onclick="setAVPU('VOICE')">V</div>
                    <div class="avpu-btn" id="avpu-p" onclick="setAVPU('PAIN')">P</div>
                    <div class="avpu-btn" id="avpu-u" onclick="setAVPU('UNRESPONSIVE')">U</div>
                </div>
                <input type="text" id="im-s" placeholder="S - Signs (AVPU/Vitals)">

                <input type="text" id="im-t" placeholder="T - Treatment">
                <input type="text" id="im-a" placeholder="A - Allergies">
                <input type="text" id="im-med" placeholder="M - Medications">
                <input type="text" id="im-b" placeholder="B - Background">
                <input type="text" id="im-o" placeholder="O - Other">
                <button class="log-btn btn-hq" style="margin-top:10px;" onclick="stampHandover()">STAMP HANDOVER</button>
            </div>

            <label>START TRIAGE GUIDE</label>
            <div class="triage-card" style="background:var(--success)">P3 - GREEN: Walking</div>
            <div class="triage-card" style="background:#FFD700">P2 - YELLOW: Delayed</div>
            <div class="triage-card" style="background:var(--danger); color:white;">P1 - RED: Immediate (No Resp/Pulse)</div>
            <div class="triage-card" style="background:black; color:white; border:1px solid #333;">BLACK: Deceased</div>
            
            <label>MARCH PROTOCOL</label>
            <div id="march-accordion" class="table-wrap"></div>
        </div>

        <div id="view-others" class="view-section hidden">
            <div class="table-wrap" style="padding:15px; border: 1px solid var(--info);">
                <label style="color:var(--info)">DATA BACKUP (SAVE BEFORE UPDATING)</label>
                <button class="log-btn btn-hq" onclick="exportData()">DOWNLOAD BACKUP (.JSON)</button>
                <label>RESTORE DATA</label>
                <input type="file" id="importFile" onchange="importData(event)">
            </div>

            <div class="table-wrap" style="padding:15px; margin-top:10px;">
                <label>Mechanical Advantage Calc</label>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="number" id="ma-input" placeholder="Weight (kg)">
                    <select id="ma-ratio"><option value="3">3:1</option><option value="5">5:1</option><option value="9">9:1</option></select>
                </div>
                <button class="log-btn btn-hq" onclick="calcMA()">Calculate Force</button>
                <div id="ma-result" style="margin-top:10px; color:var(--success)"></div>
            </div>
            
            <label>GEAR RETIREMENT LOG</label>
            <div class="table-wrap" style="padding:15px;">
                <input type="text" id="gear-name" placeholder="Item Name">
                <input type="date" id="gear-date">
                <button class="log-btn btn-standby" onclick="addGear()">ADD GEAR ENTRY</button>
                <div id="gear-list" style="margin-top:10px; font-size:0.8rem;"></div>
            </div>
            
            <button class="log-btn btn-scene" onclick="openOtherModal()">+ MANUAL PROTOCOL</button>
            <div id="others-container"></div>
        </div>
    </div>
</div>

<div id="otherModal" class="modal"><div class="modal-content">
    <input type="text" id="other-title-input" placeholder="Title">
    <textarea id="other-content-input" rows="8" placeholder="Steps..."></textarea>
    <button class="log-btn btn-scene" onclick="saveOther()">SAVE</button>
    <button class="log-btn btn-standby" onclick="closeModals()">CLOSE</button>
</div></div>

<div id="hotDebriefModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--danger)">HOT DEBRIEF</h3>
    <textarea id="debrief-notes" placeholder="Notes..."></textarea>
    <button class="log-btn btn-scene" onclick="submitDebrief()">LOG DEBRIEF</button>
    <button class="log-btn btn-standby" onclick="closeModals()">CLOSE</button>
</div></div>

<script>
    let opLogs = JSON.parse(localStorage.getItem('rv_op_logs')) || [];
    let crew = JSON.parse(localStorage.getItem('rv_crew')) || [{name: "JOHN DOE", callsign: "ALPHA-1", kit: ""}];
    let manualProtocols = JSON.parse(localStorage.getItem('rv_others')) || [];
    let gearLog = JSON.parse(localStorage.getItem('rv_gear')) || [];

    window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('splash-screen').classList.add('splash-hidden'), 2000);
        render();
        renderMarch();
        if(window.innerWidth < 768) document.getElementById('ham-btn').style.display='block';
    });

    function setAVPU(val) {
        document.querySelectorAll('.avpu-btn').forEach(b => b.classList.remove('active'));
        const btnId = 'avpu-' + val.charAt(0).toLowerCase();
        document.getElementById(btnId).classList.add('active');
        document.getElementById('im-s').value = `AVPU: ${val}`;
    }

    function exportData() {
        const data = {
            logs: opLogs, crew, others: manualProtocols, gear: gearLog,
            smeacs: {
                s: document.getElementById('sm-s').value, m: document.getElementById('sm-m').value,
                e: document.getElementById('sm-e').value, a: document.getElementById('sm-a').value,
                c: document.getElementById('sm-c').value, safety: document.getElementById('sm-safety').value
            }
        };
        const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `RescueBackup_${new Date().getTime()}.json`;
        a.click();
    }

    function importData(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            if(confirm("Overwrite current data with this backup?")) {
                opLogs = data.logs || []; crew = data.crew || [];
                manualProtocols = data.others || []; gearLog = data.gear || [];
                localStorage.setItem('rv_op_logs', JSON.stringify(opLogs));
                localStorage.setItem('rv_crew', JSON.stringify(crew));
                localStorage.setItem('rv_others', JSON.stringify(manualProtocols));
                localStorage.setItem('rv_gear', JSON.stringify(gearLog));
                if(data.smeacs) {
                    document.getElementById('sm-s').value = data.smeacs.s || "";
                    document.getElementById('sm-m').value = data.smeacs.m || "";
                    document.getElementById('sm-e').value = data.smeacs.e || "";
                    document.getElementById('sm-a').value = data.smeacs.a || "";
                    document.getElementById('sm-c').value = data.smeacs.c || "";
                    document.getElementById('sm-safety').value = data.smeacs.safety || "";
                }
                render();
            }
        };
        reader.readAsText(event.target.files[0]);
    }

    function nav(target) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + target).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + target).classList.add('active');
        if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
        render();
    }

    function toggleNight() { document.body.classList.toggle('night-mode'); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function stamp(status) {
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        opLogs.unshift({time, status});
        localStorage.setItem('rv_op_logs', JSON.stringify(opLogs));
        render();
    }

    function stampHandover() {
        const h = `HANDOVER: ID: ${document.getElementById('im-i').value} | MECH: ${document.getElementById('im-m').value} | SIGNS: ${document.getElementById('im-s').value}`;
        stamp(h);
    }

    function renderChecklist(type) {
        const lists = {
            safetycheatsheet: [
                "FALL FACTOR: (Dist Fallen / Rope Length) | Limit: >0.2 = HIGH IMPACT",
                "ANGLE LOADING: 120° Angle = 100% Load on EACH Anchor",
                "VITAL SIGNS (Adult): HR: 60-100 | RR: 12-20 | BP: 120/80"
            ],
            vertical: ["A - Anchors Tested", "R - Ropes Clear", "C - Connections Locked", "H - Harness/Helmet", "E - Energy Ready", "R - Redundancy"],
            roadcrash: ["Power Isolate", "Stabilization", "Glass Mgmt", "Hydraulic Prep"],
            hazmat: ["Wind Direction", "Exclusion Zone", "PPE Level"],
            landzone: [
                "SIZE: 30m x 30m (100ft) minimum",
                "SLOPE: Level ground (less than 5-10°)",
                "DEBRIS: Clear of cones, loose gear, or plastic",
                "SECURITY: Crowd control established",
                "WIND: Direction identified for pilot",
                "OBSTACLES: Wires/Poles identified"
            ]
        };
        
        document.getElementById('checklist-container').innerHTML = 
            `<div style="padding:15px; color:var(--safety-orange); font-weight:bold;">${type.toUpperCase()}</div>` + 
            lists[type].map(i => `<div style="padding:12px; border-top:1px solid #222;"><input type="checkbox"> ${i}</div>`).join('');
    }

    function renderMarch() {
        const march = [
            {l:"M", t:"HEMORRHAGE", c:"TQ High/Tight. Wound Packing."},
            {l:"A", t:"AIRWAY", c:"Head Tilt/Chin Lift. NPA/OPA."},
            {l:"R", t:"RESPIRATIONS", c:"Chest Seals. Needle Decompress."},
            {l:"C", t:"CIRCULATION", c:"Radial Pulses. Fluid Resus."},
            {l:"H", t:"HYPOTHERMIA", c:"Space Blankets. AVPU check."}
        ];
        document.getElementById('march-accordion').innerHTML = march.map(m => `
            <div style="padding:12px; border-bottom:1px solid #222">
                <div style="color:var(--safety-orange); font-weight:bold; font-size:0.8rem;">${m.l} - ${m.t}</div>
                <div style="font-size:0.75rem; margin-top:5px; color:#aaa">${m.c}</div>
            </div>`).join('');
    }

    function addOperator() {
        const name = prompt("Name:");
        const callsign = prompt("Callsign:");
        if(name || callsign) {
            crew.push({name: name.toUpperCase(), callsign: callsign.toUpperCase(), kit:""});
            render();
        }
    }

    function updateOperatorField(index, field, value) {
        crew[index][field] = value;
        localStorage.setItem('rv_crew', JSON.stringify(crew));
    }

    function calcMA() {
        const w = document.getElementById('ma-input').value;
        const r = document.getElementById('ma-ratio').value;
        if(w) document.getElementById('ma-result').innerHTML = `Haul Force: ${(w/r).toFixed(1)}kg`;
    }

    function addGear() {
        const name = document.getElementById('gear-name').value;
        const date = document.getElementById('gear-date').value;
        if(name) { gearLog.push({name, date}); localStorage.setItem('rv_gear', JSON.stringify(gearLog)); render(); }
    }

    function render() {
        document.getElementById('op-log-body').innerHTML = opLogs.map(l => `<tr><td style="padding:10px; font-size:0.6rem; color:#666">${l.time}</td><td style="color:var(--safety-orange); font-weight:bold;">${l.status}</td></tr>`).join('');
        
        document.getElementById('squad-list').innerHTML = crew.map((c, i) => `
            <div class="table-wrap" style="padding:15px;">
                <div style="display:flex; justify-content:space-between; border-bottom: 1px solid #222; padding-bottom:5px; margin-bottom:5px;">
                    <strong style="color:var(--safety-orange)">OPERATOR ${i+1}</strong>
                    <button class="btn-danger" style="padding:2px 10px; font-size:0.6rem" onclick="crew.splice(${i},1); render();">REMOVE</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>NAME</label><input type="text" oninput="updateOperatorField(${i}, 'name', this.value.toUpperCase())" value="${c.name || ''}"></div>
                    <div style="flex:1"><label>CALLSIGN</label><input type="text" oninput="updateOperatorField(${i}, 'callsign', this.value.toUpperCase())" value="${c.callsign || ''}"></div>
                </div>
                <label>KIT LIST</label>
                <textarea oninput="updateOperatorField(${i}, 'kit', this.value)">${c.kit}</textarea>
            </div>`).join('');

        document.getElementById('gear-list').innerHTML = gearLog.map(g => `<div>• ${g.name} (Exp: ${g.date})</div>`).join('');
        document.getElementById('others-container').innerHTML = manualProtocols.map(p => `<div class="table-wrap" style="padding:15px;"><strong>${p.title}</strong><br>${p.content}</div>`).join('');
    }

    function openHotDebrief() { document.getElementById('hotDebriefModal').style.display = 'flex'; }
    function submitDebrief() { stamp("DEBRIEF: " + document.getElementById('debrief-notes').value); closeModals(); }
    function openOtherModal() { document.getElementById('otherModal').style.display = 'flex'; }
    function saveOther() {
        manualProtocols.push({title: document.getElementById('other-title-input').value, content: document.getElementById('other-content-input').value});
        localStorage.setItem('rv_others', JSON.stringify(manualProtocols));
        closeModals(); render();
    }
    function clearLogs() { if(confirm("Wipe logs?")) { opLogs=[]; render(); } }
</script>
</body>
</html>
