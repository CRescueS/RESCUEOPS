<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RescueLog Pro | Mission Command</title>
    <style>
        :root {
            --safety-orange: #FF6B00;
            --danger: #FF4444;
            --success: #00C851;
            --info: #0099CC;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #eee;
            --sidebar-width: 260px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout Components */
        .sidebar { width: var(--sidebar-width); background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1000; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 900; }
        .hamburger { display: none; cursor: pointer; padding: 15px; z-index: 1100; background: #111; border-bottom: 1px solid #333; }
        .hamburger div { width: 25px; height: 3px; background-color: var(--safety-orange); margin: 5px 0; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .hamburger { display: block; position: sticky; top: 0; }
        }

        .nav-brand { padding: 25px; font-weight: 800; color: var(--safety-orange); border-bottom: 1px solid #222; font-size: 0.85rem; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; border-left: 4px solid transparent; font-size: 0.9rem; }
        .nav-item.active { color: #fff; background: #111; border-left-color: var(--safety-orange); }

        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .header { padding: 15px 25px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; flex: 1; }

        /* Tactical UI Elements */
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .log-btn { padding: 15px; border: none; border-radius: 8px; font-weight: 800; font-size: 0.85rem; cursor: pointer; color: #000; text-transform: uppercase; }
        .btn-hq { background: var(--info); }
        .btn-scene { background: var(--safety-orange); }
        .btn-standby { background: #666; color: #fff; }
        
        .table-wrap { background: var(--card-bg); border-radius: 8px; overflow-x: auto; border: 1px solid #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 320px; }
        th { text-align: left; background: #222; padding: 10px; font-size: 0.7rem; color: var(--safety-orange); text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        
        .status-pill { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .hidden { display: none !important; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid var(--safety-orange); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar">
    <div class="nav-brand">CASINO RESCUE COMMAND</div>
    <div id="nav-oplog" class="nav-item" onclick="nav('oplog')">⏱️ Operational Log</div>
    <div id="nav-dash" class="nav-item" onclick="nav('dash')">📊 Squad Status</div>
    <div id="nav-training" class="nav-item" onclick="nav('training')">🧗 Training Log</div>
    <div id="nav-crew" class="nav-item" onclick="nav('crew')">👥 Kits</div>
</div>

<div class="main">
    <div class="hamburger" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="header"><h2 id="view-title" style="font-size: 1rem; margin:0;">MISSION COMMAND</h2></div>

    <div class="container">
        <!-- OPERATIONAL LOG -->
        <div id="view-oplog" class="hidden">
            <div class="btn-grid">
                <button class="log-btn btn-hq" onclick="stamp('DEPARTING HQ')">Departing HQ</button>
                <button class="log-btn btn-scene" onclick="stamp('ON SCENE')">On Scene</button>
                <button class="log-btn btn-scene" onclick="stamp('DEPARTING SCENE')">Departing Scene</button>
                <button class="log-btn btn-hq" onclick="stamp('AT HQ / SHUTDOWN')">At HQ / Shutting Down</button>
                <button class="log-btn btn-standby" onclick="stamp('STANDBY')">Standby</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Time</th><th>Status</th></tr></thead>
                    <tbody id="op-log-body"></tbody>
                </table>
            </div>
            <button onclick="clearOpLog()" style="width:100%; background:#222; color:#888; border:1px solid #444; padding:10px; border-radius:8px; cursor:pointer;">CLEAR LOG HISTORY</button>
        </div>

        <!-- SQUAD STATUS -->
        <div id="view-dash" class="hidden">
            <button class="log-btn btn-scene" style="width:100%; margin-bottom:15px;" onclick="openCrewModal()">+ ADD OPERATOR</button>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Callsign</th><th>Currency</th><th>Action</th></tr></thead>
                    <tbody id="status-body"></tbody>
                </table>
            </div>
        </div>

        <!-- TRAINING LOG -->
        <div id="view-training" class="hidden">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Date</th><th>Op</th><th>Skill</th></tr></thead>
                    <tbody id="train-log-body"></tbody>
                </table>
            </div>
        </div>

        <!-- CREW KITS -->
        <div id="view-crew" class="hidden">
            <div id="kit-content"></div>
        </div>
    </div>
</div>

<div id="crewModal" class="modal">
    <div class="modal-content">
        <h3>Operator Config</h3>
        <input type="text" id="c-name" placeholder="Full Name">
        <input type="text" id="c-callsign" placeholder="Callsign">
        <button class="log-btn btn-scene" style="width:100%" onclick="saveCrew()">SAVE</button>
        <button class="log-btn btn-standby" style="width:100%; margin-top:10px;" onclick="closeModal('crewModal')">CANCEL</button>
    </div>
</div>

<script>
    // Global State
    let crew = JSON.parse(localStorage.getItem('rv_crew')) || [{name:"Lead", callsign:"ALPHA"}];
    let trainingLogs = JSON.parse(localStorage.getItem('rv_training')) || [];
    let opLogs = JSON.parse(localStorage.getItem('rv_op_logs')) || [];

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function nav(target) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('view-' + target).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + target).classList.add('active');
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }
        document.getElementById('view-title').innerText = target.toUpperCase().replace('OPLOG', 'MISSION LOG');
        render();
    }

    function stamp(status) {
        const now = new Date();
        const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        opLogs.unshift({ time: time, status: status });
        localStorage.setItem('rv_op_logs', JSON.stringify(opLogs));
        render();
    }

    function clearOpLog() {
        if(confirm("Permanently clear mission log history?")) {
            opLogs = []; // Wipe local array
            localStorage.setItem('rv_op_logs', JSON.stringify(opLogs)); // Update storage
            render(); // Refresh UI
        }
    }

    function openCrewModal() { document.getElementById('crewModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveCrew() {
        const call = document.getElementById('c-callsign').value.trim().toUpperCase();
        if (!call) return;
        if (['I','T','D','M'].includes(call[0])) return alert("Callsign cannot start with reserved triage letters (I,T,D,M).");
        
        crew.push({ name: document.getElementById('c-name').value, callsign: call });
        localStorage.setItem('rv_crew', JSON.stringify(crew));
        closeModal('crewModal');
        render();
    }

    function removeCrew(i) {
        if(confirm("Remove operator from squad?")) {
            crew.splice(i, 1);
            localStorage.setItem('rv_crew', JSON.stringify(crew));
            render();
        }
    }

    function render() {
        // 1. Mission Log
        const logBody = document.getElementById('op-log-body');
        logBody.innerHTML = opLogs.length > 0 
            ? opLogs.map(l => `<tr><td>${l.time}</td><td style="color:var(--safety-orange); font-weight:bold;">${l.status}</td></tr>`).join('')
            : '<tr><td colspan="2" style="color:#555; text-align:center;">Log Empty</td></tr>';

        // 2. Squad Status (Currency Tracking)
        const sixMo = new Date(); sixMo.setMonth(sixMo.getMonth() - 6);
        document.getElementById('status-body').innerHTML = crew.map((c, i) => {
            const hasLog = trainingLogs.some(l => l.op === c.callsign && new Date(l.date) > sixMo);
            return `<tr>
                <td><strong>${c.callsign}</strong></td>
                <td><span class="status-pill" style="background:${hasLog ? 'var(--success)' : 'var(--danger)'}"></span>${hasLog ? 'CUR' : 'EXP'}</td>
                <td><button onclick="removeCrew(${i})" style="background:none; border:none; color:var(--danger); cursor:pointer;">DEL</button></td>
            </tr>`;
        }).join('');

        // 3. Training Log
        document.getElementById('train-log-body').innerHTML = trainingLogs.length > 0
            ? trainingLogs.map(l => `<tr><td>${l.date}</td><td>${l.op}</td><td>${l.skill}</td></tr>`).join('')
            : '<tr><td colspan="3" style="color:#555; text-align:center;">No VR Sessions Logged</td></tr>';

        // 4. Kits
        document.getElementById('kit-content').innerHTML = crew.map(c => `
            <div class="table-wrap">
                <div style="padding:10px; background:#222; font-size:0.75rem; color:var(--safety-orange); font-weight:bold;">${c.callsign} :: KIT ASSIGNMENT</div>
                <table>
                    <tr><td>MARCH Medical Module</td></tr>
                    <tr><td>High-Angle Rope Mechanicals (Edelrid/Petzl)</td></tr>
                </table>
            </div>
        `).join('');
    }

    window.onload = () => nav('oplog');
</script>
</body>
</html>
